name: Site audit

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build GitHub Pages site
        run: bundle exec jekyll build --trace
      - name: Audit rendered SEO and internal links
        run: node scripts/audit-built-site.mjs
