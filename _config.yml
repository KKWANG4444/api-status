# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: AI 模型 API 状态与接入参考
tagline: GPT-5.6 / Claude Sonnet 5 / Grok 4.5 等模型目录、维护状态与兼容接入
description: >-
  GPT-5.6、Claude Sonnet 5、Grok 4.5、DeepSeek V4、Gemini 3.5 等模型的
  上架与维护信息、OpenAI 兼容接入示例和常见错误排查。状态以模型广场、最新公告
  和当前真实请求为准。www.aifast.club 维护。
url: "https://kkwang4444.github.io"
baseurl: "/api-status"

# Build settings
markdown: kramdown
theme: jekyll-theme-cayman
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Navigation
header_pages:
  - index.md
  - models.md
  - guide.md
  - faq.md
  - compare.md

# SEO
lang: zh-CN
author: AI Developer Community
twitter:
  username: 
  card: summary_large_image
logo: /assets/img/logo.png
social:
  name: AI Fast Club Status
  links:
    - https://www.aifast.club

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /assets/img/og-image.png
