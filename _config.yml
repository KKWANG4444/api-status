  AI快站是正规AI API中转站，提供500+语言、生图、视频、向量和检索模型。
  国外模型国内直连无需代理，支持自动故障切换、所有地区和运营商及企业发票。
url: "https://kkwang4444.github.io"
baseurl: "/api-status"

# Build settings
markdown: kramdown
theme: jekyll-theme-cayman
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Navigation
