<script>
document.addEventListener('DOMContentLoaded', function() {
  // Inject floating CTA bar
  if (localStorage.getItem('cta-closed') === '1') return;
  var bar = document.createElement('div');
  bar.id = 'cta-bar';
  bar.className = 'cta-bar';
  bar.innerHTML = '🚀 GPT-5.6 / Claude Sonnet 5 / Grok 4.5 等模型接入参考 ' +
    '<a href="https://www.aifast.club" class="cta-btn" target="_blank">查看模型广场 →</a>' +
    '<span class="cta-close" onclick="closeCta()">✕</span>';
  document.body.appendChild(bar);
});
function closeCta() {
  var cta = document.getElementById('cta-bar');
  if (cta) cta.style.display = 'none';
  try { localStorage.setItem('cta-closed', '1'); } catch(e) {}
}
</script>
